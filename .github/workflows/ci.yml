name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela corridas viejas de la misma rama/PR cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validar JSON de licencias contra el schema
        run: npm run validate:data

      - name: Tests (vitest)
        run: npm test

      - name: Build (next)
        run: npm run build
